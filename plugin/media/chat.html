<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 13px/1.5 -apple-system, sans-serif; padding: 0; color: var(--vscode-foreground); background: var(--vscode-sideBar-background); }
  #messages { padding: 12px 8px; min-height: calc(100vh - 100px); max-height: calc(100vh - 100px); overflow-y: auto; }
  .msg { margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; max-width: 95%; word-wrap: break-word; }
  .msg.user { background: var(--vscode-button-background); color: var(--vscode-button-foreground); margin-left: auto; text-align: right; max-width: 80%; }
  .stage { font-size: 11px; padding: 4px 6px; margin: 4px 0; border-radius: 4px; opacity: 0.85; }
  .stage.plan { color: #61afef; border-left: 3px solid #61afef; padding-left: 8px; }
  .stage.search { color: #e5c07b; border-left: 3px solid #e5c07b; padding-left: 8px; }
  .stage.reflect { color: #c678dd; border-left: 3px solid #c678dd; padding-left: 8px; }
  .stage.answer { background: var(--vscode-editor-background); padding: 8px; border-radius: 6px; line-height: 1.7; }
  .stage.answer code { background: var(--vscode-textCodeBlock-background); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .ref { color: var(--vscode-textLink-foreground); cursor: pointer; text-decoration: underline; font-size: 11px; display: inline-block; margin: 2px 6px 2px 0; }
  .ref:hover { color: var(--vscode-textLink-activeForeground); }
  .error { color: #e06c75; padding: 8px; background: #2d1b1c; border-radius: 4px; }
  .done { color: var(--vscode-descriptionForeground); font-size: 11px; text-align: center; margin: 8px 0; }
  #input-box { position: fixed; bottom: 0; left: 0; right: 0; display: flex; padding: 8px; background: var(--vscode-sideBar-background); border-top: 1px solid var(--vscode-sideBar-border); }
  #input-box textarea { flex: 1; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); border-radius: 6px; padding: 8px; resize: none; font: inherit; outline: none; min-height: 32px; max-height: 80px; }
  #input-box button { margin-left: 6px; background: var(--vscode-button-background); color: var(--vscode-button-foreground); border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font: inherit; }
  .typing { display: inline-block; width: 6px; height: 12px; background: var(--vscode-foreground); animation: blink 0.8s infinite; vertical-align: middle; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="messages"></div>

<div id="input-box">
  <textarea id="question" rows="1" placeholder="Ask about your codebase..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();ask()}"></textarea>
  <button onclick="ask()">Ask</button>
</div>

<script>
const vscode = acquireVsCodeApi();
const msgs = document.getElementById('messages');
const input = document.getElementById('question');

let currentAnswer = null;
let typingIndicator = null;

function msg(html, cls) {
  const d = document.createElement('div');
  d.className = 'msg ' + (cls || '');
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function stageEl(cls, text) {
  const d = document.createElement('div');
  d.className = 'stage ' + cls;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  return d;
}

function refEl(file, line, symbol) {
  const label = symbol ? `${symbol} (${file.split('/').pop()}:${line})` : `${file.split('/').pop()}:${line}`;
  return `<span class="ref" onclick="openFile('${file}',${line})">${label}</span>`;
}

function openFile(file, line) {
  vscode.postMessage({ type: 'openFile', file, line });
}

function ask() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  // Show user message
  msg(escapeHtml(q), 'user');

  // Create answer container
  currentAnswer = document.createElement('div');
  currentAnswer.className = 'msg';
  msgs.appendChild(currentAnswer);
  msgs.scrollTop = msgs.scrollHeight;

  vscode.postMessage({ type: 'ask', question: q });
}

// Handle messages from extension
window.addEventListener('message', (e) => {
  const m = e.data;

  switch (m.type) {
    case 'sse':
      handleSSE(m.event, m.data);
      break;
    case 'done':
      if (typingIndicator) { typingIndicator.remove(); typingIndicator = null; }
      const doneEl = document.createElement('div');
      doneEl.className = 'done';
      doneEl.textContent = '── Done ──';
      msgs.appendChild(doneEl);
      msgs.scrollTop = msgs.scrollHeight;
      currentAnswer = null;
      break;
    case 'askQuestion':
      // Triggered externally (e.g. Explain Code command)
      msg(escapeHtml(m.question), 'user');
      break;
    case 'error':
      stageEl('', '');
      const errEl = document.createElement('div');
      errEl.className = 'error';
      errEl.textContent = m.message;
      msgs.appendChild(errEl);
      msgs.scrollTop = msgs.scrollHeight;
      currentAnswer = null;
      break;
  }
});

function handleSSE(event, data) {
  switch (event) {
    case 'plan': {
      const iter = data.iteration || 1;
      const qs = (data.queries || []).join(', ');
      stageEl('plan', `Plan [round ${iter}] — ${data.reasoning || ''}  Queries: ${qs}`);
      break;
    }
    case 'search': {
      const count = data.results_count || 0;
      const files = (data.files || []).map(f => f.split('/').pop()).join(', ');
      stageEl('search', `Search "${data.query}" → ${count} results (${files})`);
      break;
    }
    case 'reflect': {
      const txt = data.sufficient ? 'Sufficient' : 'Need more' + (data.missing ? ': ' + data.missing : '');
      stageEl('reflect', `Reflect: ${txt}  (${data.total_chunks} chunks so far)`);
      break;
    }
    case 'answer': {
      if (!currentAnswer) return;
      currentAnswer.className = 'msg stage answer';
      // Show references on first delta
      if (data.references && !currentAnswer.dataset.hasRefs) {
        currentAnswer.dataset.hasRefs = '1';
        const files = [...new Set(data.references.map(r => r.file))];
        currentAnswer.innerHTML += '<div style="margin-bottom:6px;font-size:11px;color:var(--vscode-descriptionForeground)">Sources: ';
        data.references.forEach(r => {
          currentAnswer.innerHTML += refEl(r.file, r.line, r.symbol) + ' ';
        });
        currentAnswer.innerHTML += '</div>';
      }
      // Append delta text
      const text = data.delta || '';
      currentAnswer.innerHTML += escapeHtml(text);
      msgs.scrollTop = msgs.scrollHeight;
      break;
    }
    case 'done': {
      break; // handled by main 'done' message
    }
    case 'error': {
      stageEl('error', data.message);
      break;
    }
  }
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
